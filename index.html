<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ATLAS</title>
<link rel="stylesheet" href="assets/css/styles.css"></head>
<body><div id="gate"><div class="gateCard"><h1 style="margin:0 0 12px;font-size:2.4rem;letter-spacing:.08em">ATLAS</h1><input id="pw" type="password" placeholder="Password"><button onclick="unlock()">Enter</button><div id="err" style="color:var(--bad);min-height:20px;margin-top:10px"></div></div></div>
<div class="mobileTop"><div style="display:flex;justify-content:space-between;align-items:center"><b style="letter-spacing:.08em">ATLAS</b><button class="btn" onclick="logout()">Log out</button></div><div id="mobileNav" class="mobileNav"></div></div>
<div class="shell" id="shell"><aside class="side"><div class="brand"><span class="label">ATLAS</span><button class="toggle" onclick="toggleMenu()">☰</button></div><div id="sideNav"></div><button class="navBtn" onclick="logout()"><span class="ico">⏻</span><span class="label">Log out</span></button></aside><main class="main"><div class="top"><div><h1 id="heading">Overview</h1><div id="sub" class="desc"></div></div><div class="searchBox"><input id="globalSearch" type="search" placeholder="Search ATLAS" autocomplete="off"><div id="searchResults" class="searchResults"></div></div></div><div id="panel"></div></main></div><button class="jsonFab" onclick="openJson()">{ } JSON</button>
<div class="modal" id="jsonModal"><div class="modalInner"><div style="display:flex;justify-content:space-between"><h2>JSON Editor</h2><button class="btn" onclick="closeJson()">Close</button></div><button class="btn" onclick="formatJson()">Format</button><button class="btn" onclick="validateJson()">Validate</button><button class="btn" onclick="validateDataFromEditor()">Validate Data</button><button class="btn primary" onclick="loadJson()">Load</button><button class="btn primary" onclick="downloadJson()">Download</button><div id="jsonStatus" class="desc">No validation run.</div><div id="validationResults" class="validationResults"></div><textarea id="jsonbox"></textarea></div></div>
<script src="assets/js/state.js"></script>
<script src="assets/js/data-loader.js"></script>
<script src="assets/js/scoring.js"></script>
<script src="assets/js/renderers.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/validation.js"></script>
<script src="assets/js/json-editor.js"></script>
<script src="assets/js/search.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script></body></html>
