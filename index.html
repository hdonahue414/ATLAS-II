<link rel="stylesheet" href="assets/css/styles.css?v=20260514d"><style>.card,.metric,.grid,.vizGrid,.compareGrid{overflow:visible}.hint,.hint span{z-index:5000}.hint span{z-index:5000!important}.card:has(.hint:hover),.card:has(.hint:focus),.metric:has(.hint:hover),.metric:has(.hint:focus){position:relative;z-index:400}.shell,.shell:not(.open) .side{overflow:visible}.shell:not(.open) .side{z-index:300}.shell:not(.open) .side .navBtn{position:relative}.shell:not(.open) .side .navBtn .label{display:none}.shell:not(.open) .side .navBtn[data-tip]::after{content:attr(data-tip);position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);z-index:5000!important;width:max-content;max-width:220px;padding:8px 10px;border:1px solid rgba(132,174,252,.24);border-radius:10px;background:#0b1220;color:var(--text);box-shadow:0 14px 34px rgba(0,0,0,.38);font-size:.78rem;line-height:1.35;opacity:0;pointer-events:none}.shell:not(.open) .side .navBtn:hover::after,.shell:not(.open) .side .navBtn:focus::after{opacity:1}.splash{position:fixed;inset:0;z-index:9998;display:none;place-items:center;overflow:hidden;background:radial-gradient(circle at 50% 44%,rgba(132,174,252,.18),transparent 27rem),radial-gradient(circle at 50% 58%,rgba(157,231,215,.07),transparent 20rem),linear-gradient(180deg,#05070d,#070b14 58%,#05070d)}.splash:before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(132,174,252,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(132,174,252,.04) 1px,transparent 1px),repeating-linear-gradient(0deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 1px,transparent 1px,transparent 4px);background-size:84px 84px,84px 84px,100% 4px;mask-image:radial-gradient(circle at center,black,transparent 74%);opacity:.62}.splash:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(245,247,251,.12),rgba(132,174,252,.08),transparent);transform:translateX(-130%);opacity:.78}.splash.active:after{animation:splashScan 2.15s ease-out forwards}.splashFrame{position:relative;z-index:1;text-align:center;padding:28px;width:min(620px,92vw)}.atlasWordmark{font-size:clamp(3.25rem,11vw,7.7rem);line-height:.9;font-weight:900;letter-spacing:.31em;text-indent:.31em;color:#f8fbff;text-shadow:0 0 34px rgba(132,174,252,.36),0 0 2px rgba(255,255,255,.92);opacity:0;transform:translateY(16px) scale(.94);filter:blur(7px)}.splashGreeting{margin-top:24px;color:#dce7f7;font-size:clamp(1rem,2.8vw,1.35rem);letter-spacing:.06em;opacity:0;transform:translateY(10px);text-shadow:0 0 18px rgba(132,174,252,.18)}.splash.active .atlasWordmark{animation:wordmarkReveal 1.28s cubic-bezier(.16,.84,.24,1) forwards}.splash.active .splashGreeting{animation:greetingReveal .95s ease .78s forwards}.splash.exiting{animation:splashExit .54s ease forwards}@keyframes wordmarkReveal{0%{opacity:0;transform:translateY(16px) scale(.94);letter-spacing:.31em;filter:blur(7px)}58%{opacity:1;transform:translateY(0) scale(1.025);letter-spacing:.22em;filter:blur(.6px)}100%{opacity:1;transform:translateY(0) scale(1);letter-spacing:.18em;filter:blur(0)}}@keyframes greetingReveal{to{opacity:.92;transform:translateY(0)}}@keyframes splashScan{to{transform:translateX(130%)}}@keyframes splashExit{to{opacity:0;visibility:hidden}}.jsonImport{display:grid;gap:12px;margin:14px 0}.jsonDrop{border:1px dashed rgba(132,174,252,.36);border-radius:18px;background:linear-gradient(180deg,rgba(132,174,252,.08),rgba(17,26,46,.42));padding:24px;text-align:center;color:var(--muted)}.jsonDrop.active{border-color:rgba(157,231,215,.75);background:rgba(157,231,215,.08);color:var(--text)}.jsonDrop b{display:block;color:var(--text);font-size:1.05rem;margin-bottom:6px}.importPreview{display:grid;gap:8px}.importSummary{display:flex;justify-content:space-between;gap:12px;align-items:center;background:#111a2e;border:1px solid rgba(132,174,252,.16);border-radius:14px;padding:12px;flex-wrap:wrap}.importSummary span{display:block;color:var(--muted);font-size:.82rem;margin-top:3px}.advancedJson{margin-top:14px;border-top:1px solid rgba(132,174,252,.14);padding-top:12px}.advancedJson summary{cursor:pointer;color:var(--muted);font-weight:700}.advancedJson .advancedControls{margin:12px 0}@media(prefers-reduced-motion:reduce){.splash,.splash:after,.splash.active .atlasWordmark,.splash.active .splashGreeting,.splash.exiting{animation:none!important}.atlasWordmark,.splashGreeting{opacity:1;transform:none;filter:none;letter-spacing:.18em}}</style></head>
<body><div id="gate"><div class="gateCard"><h1 style="margin:0 0 12px;font-size:2.4rem;letter-spacing:.08em">ATLAS</h1><input id="user" type="text" placeholder="Name" autocomplete="username"><input id="pw" type="password" placeholder="Password" autocomplete="current-password" style="margin-top:10px"><button onclick="unlock()">Enter</button><div id="err" style="color:var(--bad);min-height:20px;margin-top:10px"></div></div></div>
<div id="splash" class="splash" aria-hidden="true"><div class="splashFrame"><div class="atlasWordmark">ATLAS</div><div id="splashGreeting" class="splashGreeting">Hello, Harper.</div></div></div>
<div class="mobileTop"><div style="display:flex;justify-content:space-between;align-items:center"><b style="letter-spacing:.08em">ATLAS</b><button class="btn" onclick="logout()">Log out</button></div><div id="mobileNav" class="mobileNav"></div></div>
<div class="shell" id="shell"><aside class="side"><div class="brand"><span class="label">ATLAS</span><button class="toggle" onclick="toggleMenu()">☰</button></div><div id="sideNav"></div><button class="navBtn" data-tip="Log out" onclick="logout()"><span class="ico">⏻</span><span class="label">Log out</span></button></aside><main class="main"><div class="top"><div><h1 id="heading">Overview</h1><div id="sub" class="desc"></div></div><div class="searchBox"><input id="globalSearch" type="search" placeholder="Search ATLAS" autocomplete="off"><div id="searchResults" class="searchResults"></div></div></div><div id="panel"></div></main></div><button class="jsonFab" onclick="openJson()">{ } JSON</button>
<div class="modal" id="jsonModal"><div class="modalInner"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h2>JSON Import</h2><div><button class="btn primary" onclick="downloadJson()">Download JSON</button><button class="btn" onclick="closeJson()">Close</button></div></div><div class="jsonImport"><div id="jsonDrop" class="jsonDrop" ondragover="dragJson(event,true)" ondragleave="dragJson(event,false)" ondrop="dropJson(event)"><b>Drop JSON file here</b><span>Preview and validation run before anything changes.</span><br><button class="btn" onclick="chooseJsonFile()">Choose JSON file</button><input id="jsonFileInput" type="file" accept="application/json,.json" hidden onchange="selectJsonFile(event)"></div><div id="importPreview" class="importPreview"></div></div><div id="jsonStatus" class="desc">No validation run.</div><div id="validationResults" class="validationResults"></div><details class="advancedJson"><summary>Advanced raw JSON editor</summary><div class="advancedControls"><button class="btn" onclick="formatJson()">Format</button><button class="btn" onclick="validateJson()">Validate</button><button class="btn" onclick="validateDataFromEditor()">Validate Data</button><button class="btn primary" onclick="loadJson()">Load from editor</button></div><textarea id="jsonbox"></textarea></details></div></div>
