<link rel="stylesheet" href="assets/css/styles.css?v=20260514d"><style>.card,.metric,.grid,.vizGrid,.compareGrid{overflow:visible}.hint,.hint span{z-index:5000}.hint span{z-index:5000!important}.card:has(.hint:hover),.card:has(.hint:focus),.metric:has(.hint:hover),.metric:has(.hint:focus){position:relative;z-index:400}.shell,.shell:not(.open) .side{overflow:visible}.shell:not(.open) .side{z-index:300}.shell:not(.open) .side .navBtn{position:relative}.shell:not(.open) .side .navBtn .label{display:none}.shell:not(.open) .side .navBtn[data-tip]::after{content:attr(data-tip);position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);z-index:5000!important;width:max-content;max-width:220px;padding:8px 10px;border:1px solid rgba(132,174,252,.24);border-radius:10px;background:#0b1220;color:var(--text);box-shadow:0 14px 34px rgba(0,0,0,.38);font-size:.78rem;line-height:1.35;opacity:0;pointer-events:none}.shell:not(.open) .side .navBtn:hover::after,.shell:not(.open) .side .navBtn:focus::after{opacity:1}.splash{position:fixed;inset:0;z-index:9998;display:none;place-items:center;overflow:hidden;background:radial-gradient(circle at 50% 44%,rgba(132,174,252,.18),transparent 27rem),radial-gradient(circle at 50% 58%,rgba(157,231,215,.07),transparent 20rem),linear-gradient(180deg,#05070d,#070b14 58%,#05070d)}.splash:before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(132,174,252,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(132,174,252,.04) 1px,transparent 1px),repeating-linear-gradient(0deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 1px,transparent 1px,transparent 4px);background-size:84px 84px,84px 84px,100% 4px;mask-image:radial-gradient(circle at center,black,transparent 74%);opacity:.62}.splash:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(245,247,251,.12),rgba(132,174,252,.08),transparent);transform:translateX(-130%);opacity:.78}.splash.active:after{animation:splashScan 2.15s ease-out forwards}.splashFrame{position:relative;z-index:1;text-align:center;padding:28px;width:min(620px,92vw)}.atlasWordmark{font-size:clamp(3.25rem,11vw,7.7rem);line-height:.9;font-weight:900;letter-spacing:.31em;text-indent:.31em;color:#f8fbff;text-shadow:0 0 34px rgba(132,174,252,.36),0 0 2px rgba(255,255,255,.92);opacity:0;transform:translateY(16px) scale(.94);filter:blur(7px)}.splashGreeting{margin-top:24px;color:#dce7f7;font-size:clamp(1rem,2.8vw,1.35rem);letter-spacing:.06em;opacity:0;transform:translateY(10px);text-shadow:0 0 18px rgba(132,174,252,.18)}.splash.active .atlasWordmark{animation:wordmarkReveal 1.28s cubic-bezier(.16,.84,.24,1) forwards}.splash.active .splashGreeting{animation:greetingReveal .95s ease .78s forwards}.splash.exiting{animation:splashExit .54s ease forwards}@keyframes wordmarkReveal{0%{opacity:0;transform:translateY(16px) scale(.94);letter-spacing:.31em;filter:blur(7px)}58%{opacity:1;transform:translateY(0) scale(1.025);letter-spacing:.22em;filter:blur(.6px)}100%{opacity:1;transform:translateY(0) scale(1);letter-spacing:.18em;filter:blur(0)}}@keyframes greetingReveal{to{opacity:.92;transform:translateY(0)}}@keyframes splashScan{to{transform:translateX(130%)}}@keyframes splashExit{to{opacity:0;visibility:hidden}}.jsonImport{display:grid;gap:12px;margin:14px 0}.jsonDrop{border:1px dashed rgba(132,174,252,.36);border-radius:18px;background:linear-gradient(180deg,rgba(132,174,252,.08),rgba(17,26,46,.42));padding:24px;text-align:center;color:var(--muted)}.jsonDrop.active{border-color:rgba(157,231,215,.75);background:rgba(157,231,215,.08);color:var(--text)}.jsonDrop b{display:block;color:var(--text);font-size:1.05rem;margin-bottom:6px}.importPreview{display:grid;gap:8px}.importSummary{display:flex;justify-content:space-between;gap:12px;align-items:center;background:#111a2e;border:1px solid rgba(132,174,252,.16);border-radius:14px;padding:12px;flex-wrap:wrap}.importSummary span{display:block;color:var(--muted);font-size:.82rem;margin-top:3px}.advancedJson{margin-top:14px;border-top:1px solid rgba(132,174,252,.14);padding-top:12px}.advancedJson summary{cursor:pointer;color:var(--muted);font-weight:700}.advancedJson .advancedControls{margin:12px 0}.profileGreeting{color:var(--muted);font-size:.82rem;letter-spacing:.03em;white-space:nowrap}.sideProfile{display:grid;gap:6px;margin-top:10px}.shell.open .sideProfile{padding:0 10px}.shell:not(.open) .sideProfile .profileGreeting{display:none}.toriModeIntro{border-color:rgba(157,231,215,.3);background:linear-gradient(180deg,rgba(157,231,215,.11),rgba(11,18,32,.9))}.toriModeIntro h2{max-width:820px;font-size:1.55rem;line-height:1.22}.toriModeGrid{margin-bottom:16px}.toriModeCard{border-color:rgba(157,231,215,.18)}.toriModeCard .pill{background:rgba(157,231,215,.08);border-color:rgba(157,231,215,.16)}.cityLifePanel{border-color:rgba(157,231,215,.22);background:linear-gradient(180deg,rgba(157,231,215,.075),rgba(11,18,32,.88))}.cityLifePanel h3{margin-bottom:6px}.cityLifeDeck{margin-bottom:16px}.cityLifeCompact{border-color:rgba(157,231,215,.2)}.cityLifeCompact h3{margin-top:0}.cityLifeMeta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.cityLifeMeta span{border:1px solid rgba(132,174,252,.16);border-radius:999px;padding:5px 8px;color:var(--muted);font-size:.76rem}.cityLifeSignalGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px}.cityLifeSignal{background:rgba(5,9,20,.52);border:1px solid rgba(157,231,215,.12);border-radius:14px;padding:10px}.cityLifeSignal b{display:block;font-size:.78rem;color:#dce7f7;margin-bottom:3px}.cityLifeSignal span{color:var(--muted);font-size:.8rem}.cityLifeEmpty{border-style:dashed;color:var(--muted)}@media(prefers-reduced-motion:reduce){.splash,.splash:after,.splash.active .atlasWordmark,.splash.active .splashGreeting,.splash.exiting{animation:none!important}.atlasWordmark,.splashGreeting{opacity:1;transform:none;filter:none;letter-spacing:.18em}}</style></head>
<body><div id="gate"><div class="gateCard"><h1 style="margin:0 0 12px;font-size:2.4rem;letter-spacing:.08em">ATLAS</h1><input id="user" type="text" placeholder="Name" autocomplete="username"><input id="pw" type="password" placeholder="Password" autocomplete="current-password" style="margin-top:10px"><button onclick="unlock()">Enter</button><div id="err" style="color:var(--bad);min-height:20px;margin-top:10px"></div></div></div>

<script>
function evidenceTraceGrid(s){let tr=s.source_trace||{};return `<div class="grid">${['verified','inferred','speculative','unresolved'].map(k=>`<div class="metric"><div class="k">${k}</div>${pills(tr[k]||[])}</div>`).join('')}</div>`}
function schoolEvidenceNotes(s){let seen=new Set(),items=[];let add=t=>{let v=String(t||'').replace(/\s+/g,' ').trim();if(v&&!seen.has(v.toLowerCase())){seen.add(v.toLowerCase());items.push(v)}};add(s.alumni_current_student_outcomes?.outcome_pattern);(s.public_testimony||[]).slice(0,2).forEach(p=>add(p.summary));return items.length?`<div class="metric"><div class="k">Evidence notes</div>${items.map(x=>`<p>${esc(x)}</p>`).join('')}</div>`:''}
function evidenceView(){return `<div class="grid">${ranked().map(s=>`<div class="card"><h3>${s.name} ${evidenceBadge(s)}</h3>${evidenceTraceGrid(s)}${schoolEvidenceNotes(s)}</div>`).join('')}</div>`+relationshipBlock()}
function atlasIsTori(){return (typeof getActiveProfile==='function'?getActiveProfile():window.ATLAS_ACTIVE_PROFILE)?.id==='tori'}
function cityLifeList(a){return Array.isArray(a)?a.filter(Boolean).map(x=>typeof x==='string'?x:(x.name||x.label||x.title||'')).filter(Boolean):[]}
function cityLifeModule(s,k){let m=s.system_modules?.[k];return m?`${k.replaceAll('_',' ')} ${Math.round((m.score||0)*100)}%`:''}
function cityLifeRecord(s){let l=s.city_life||s.location_intelligence||{},loc=s.location||{},env=s.environmental_rhythm||{},cost=s.daily_cost_friction||{},fail=s.failure_modes||{},liv=s.scores?.livability||{};let resources=cityLifeList(l.lgbtq_resources);return {city:l.city||[loc.city,loc.state].filter(Boolean).join(', '),setting:loc.setting||'',neighborhoods:cityLifeList(l.neighborhoods),thirdPlaces:cityLifeList(l.third_places).concat(cityLifeList(l.points_of_interest)).slice(0,6),arts:cityLifeList(l.arts_community_infrastructure).concat(cityLifeList(l.arts_infrastructure),cityLifeList(s.documentary_ecosystem)).slice(0,6),queer:cityLifeList(l.queer_community_infrastructure).concat(resources).slice(0,6),sensory:cityLifeList(l.sensory_social_tags).concat([loc.setting,loc.energy_profile]).filter(Boolean).slice(0,5),transit:cityLifeList(l.transit_logistics_friction).concat([cityLifeModule(s,'walkability_transit'),cost.food_transit_pressure?`food/transit friction ${pct(cost.food_transit_pressure)}%`:'' ]).filter(Boolean).slice(0,5),livability:cityLifeList(l.livability_notes).concat([liv.notes,loc.energy_profile,s.ordinary_tuesday]).filter(Boolean).slice(0,4),relationship:cityLifeList(l.relationship_life_fit_notes).concat([fail.identity_stress?.notes,cityLifeModule(s,'relationship_sustainability'),cityLifeModule(s,'community_integration')]).filter(Boolean).slice(0,4),signals:[['Everyday Life',[cityLifeModule(s,'daily_routine'),cityLifeModule(s,'walkability_transit')]],['Social & Cultural Ecology',[cityLifeModule(s,'social_belonging'),cityLifeModule(s,'third_places')]],['Relationship Sustainability',[cityLifeModule(s,'relationship_sustainability'),cityLifeModule(s,'isolation_risk')]],['Community Integration',[cityLifeModule(s,'community_integration'),cityLifeModule(s,'friendship_formation')]],['Creative-Life Survivability',[cityLifeModule(s,'creative_metabolism'),cityLifeModule(s,'local_doc_scene')]],['Health & Recoverability',[cityLifeModule(s,'healthcare_friction'),cityLifeModule(s,'recovery_cycles')]]]}}
function cityLifeGroup(title,items){return `<div class="metric ${items.length?'':'cityLifeEmpty'}"><div class="k">${title}</div>${items.length?pills(items):'<p class="desc">No specific field notes yet.</p>'}</div>`}
function cityLifeSignalBlocks(r){return `<div class="cityLifeSignalGrid">${r.signals.map(([t,items])=>`<div class="cityLifeSignal"><b>${t}</b><span>${items.filter(Boolean).join(' / ')||'Awaiting direct evidence'}</span></div>`).join('')}</div>`}
function cityLifePanel(s,mode='detail'){let r=cityLifeRecord(s);return `<div class="card cityLifePanel"><h3>City/Life field notes</h3><p class="desc">${esc(r.city||'Location record incomplete')}${r.setting?` · ${esc(r.setting)}`:''}</p><div class="cityLifeMeta"><span>lived environment</span><span>relationship ecology</span><span>sparse-data compatible</span></div><div class="grid">${cityLifeGroup('Neighborhoods',r.neighborhoods)}${cityLifeGroup('Third places',r.thirdPlaces)}${cityLifeGroup('Arts/community infrastructure',r.arts)}${cityLifeGroup('Queer/community infrastructure',r.queer)}${cityLifeGroup('Sensory/social tags',r.sensory)}${cityLifeGroup('Transit/logistics friction',r.transit)}${cityLifeGroup('Livability notes',r.livability)}${cityLifeGroup('Relationship/life-fit notes',r.relationship)}</div>${mode==='tori'?cityLifeSignalBlocks(r):''}</div>`}
function cityLifeToriDashboard(){return `<div class="grid cityLifeDeck">${ranked().map(s=>{let r=cityLifeRecord(s);return `<div class="card cityLifeCompact"><h3>${s.name}</h3><p class="desc">${esc(r.city||'Location record incomplete')}</p>${cityLifeSignalBlocks(r)}<div style="margin-top:12px">${pills(r.thirdPlaces.concat(r.queer).slice(0,5))||'<p class="desc">No City/Life signals yet.</p>'}</div></div>`}).join('')}</div>`}
function toriModeOverview(){return toriModeSections()+`<div class="heroGrid">${ranked().map((s,i)=>schoolCard(s,i)).join('')}</div>`}
function toriModeSections(){let sections=[['Everyday Life',['pace/rhythm','walkability/transit','overstimulation','weather/environment','routine friction','neighborhood fit']],['Social & Cultural Ecology',['live culture','third places','participatory culture']],['Relationship Sustainability',['affordability pressure','burnout pressure','shared-routine viability','partner independence','social isolation risk','emotional recoverability']],['Community Integration',['newcomer openness','friend-making difficulty','social fragmentation','age-demographic fit','queer/community infrastructure']],['Creative-Life Survivability',['arts-job ecosystem','freelance viability','work/life sustainability','creative burnout risk','local arts infrastructure']],['Health & Recoverability',['healthcare access','disability accessibility','sensory load','physical recoverability','environmental stress']]];return `<div class="card toriModeIntro"><h2>City/Life is the primary reading layer in Tori Mode.</h2><p class="desc">The same shared field-note system remains available inside school detail for Harper, with emphasis changing by profile rather than by data model.</p></div>${cityLifeToriDashboard()}<div class="grid toriModeGrid">${sections.map(([title,items])=>`<div class="metric toriModeCard"><div class="k">${title}</div>${pills(items)}<p class="desc">Weighted through the shared City/Life layer as evidence accumulates.</p></div>`).join('')}</div>`}
if(typeof VIEWS!=='undefined'){let harperOverview=VIEWS.overview,programDetail=VIEWS.programs;VIEWS.overview=function(){return atlasIsTori()?toriModeOverview():harperOverview()};VIEWS.programs=function(){let base=programDetail(),s=DATA.schools[selected];return base+cityLifePanel(s,atlasIsTori()?'tori':'detail')}}
</script>
